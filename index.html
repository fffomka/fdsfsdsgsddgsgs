  <script src="script.js"></script>
</div>

  <div class="bonus-toast" id="bonusToast">
    <button class="toast-close" type="button" onclick="closeBonusToast()" aria-label="Close">×</button>
    <div class="toast-icon">🎁</div>
    <div class="toast-content">
      <h2 id="toastTitle">Claim your bonus</h2>
      <p id="toastText">Register now and get a 500% bonus plus 500FS using this promo code.</p>
      <div class="toast-code">
        <span id="toastCodeLabel">Promo code</span>
        <div class="code-row">
          <strong id="promoCode">GGRR</strong>
          <button class="copy-btn" onclick="copyPromo()">Copy</button>
        </div>
      </div>
    </div>
  </div>

  <div class="fake-win-toast" id="fakeWinToast">
    <div class="fake-win-flag" id="fakeWinFlag">🇺🇸</div>
    <div class="fake-win-copy">
      <small id="fakeWinId">ID: 482***</small>
      <strong id="fakeWinAmount">BIG WIN +$347</strong>
    </div>
  </div>

  <script>
    (function () {
      const flags = ['🇺🇸','🇬🇧','🇮🇳','🇪🇸','🇫🇷','🇮🇹','🇺🇿','🇹🇯','🇦🇪','🇩🇪','🇧🇷','🇲🇽'];

      let audioUnlocked = false;
      let audioCtx = null;

      function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function unlockAudio() {
        if (audioUnlocked) return;
        audioUnlocked = true;

        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          if (audioCtx.state === 'suspended') audioCtx.resume();

          // very quiet unlock click
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 660;
          gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.025, audioCtx.currentTime + 0.01);
          gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.12);
          osc.start();
          osc.stop(audioCtx.currentTime + 0.13);
        } catch (e) {
          audioCtx = null;
        }
      }

      function playJackpotSound() {
        if (!audioUnlocked || !audioCtx) return;

        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }

        const now = audioCtx.currentTime;
        const gain = audioCtx.createGain();
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(0.0001, now);
        gain.gain.exponentialRampToValueAtTime(0.12, now + 0.03);
        gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.9);

        const notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];

        notes.forEach(function (freq, index) {
          const osc = audioCtx.createOscillator();
          osc.type = 'triangle';
          osc.frequency.setValueAtTime(freq, now + index * 0.09);
          osc.connect(gain);
          osc.start(now + index * 0.09);
          osc.stop(now + index * 0.09 + 0.22);
        });
      }

      function showJackpot() {
        const toast = document.getElementById('fakeWinToast');
        const flag = document.getElementById('fakeWinFlag');
        const id = document.getElementById('fakeWinId');
        const amount = document.getElementById('fakeWinAmount');

        if (!toast || !flag || !id || !amount) return;

        const win = rand(3000, 12000);

        flag.textContent = flags[rand(0, flags.length - 1)];
        id.textContent = 'ID: ' + rand(100, 999) + '***';
        amount.textContent = 'JACKPOT +$' + win.toLocaleString('en-US');

        toast.classList.remove('is-visible');
        void toast.offsetWidth;
        toast.classList.add('jackpot');
        toast.classList.add('is-visible');

        playJackpotSound();

        setTimeout(function () {
          toast.classList.remove('is-visible');
        }, 4500);
      }

      function schedule() {
        setTimeout(function () {
          showJackpot();
          schedule();
        }, rand(20000, 35000));
      }

      document.addEventListener('click', unlockAudio, { once: true });
      document.addEventListener('touchstart', unlockAudio, { once: true });

      window.showJackpotNow = showJackpot;
      window.unlockJackpotSound = unlockAudio;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function () {
          setTimeout(showJackpot, 3000);
          schedule();
        });
      } else {
        setTimeout(showJackpot, 3000);
        schedule();
      }
    })();
  </script>

</body>
</html>
